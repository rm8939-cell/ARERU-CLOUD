# 互換: 旧 NAR daily wake → 新 racing-daily.yml と同等（NAR+JRA）
name: NAR daily wake

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 1 * * *'
    - cron: '0 5 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  wake-and-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wake app and run NAR + JRA daily cron
        env:
          APP_URL: ${{ secrets.RENDER_APP_URL }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          set -euo pipefail
          BASE="${APP_URL:-https://areru-cloud.onrender.com}"
          BASE="${BASE%/}"
          echo "Waking ${BASE} ..."
          curl -fsS -o /dev/null -w "wake_nar=%{http_code}\n" --max-time 90 \
            "${BASE}/?source=nar&mode=predict" || true
          curl -fsS -o /dev/null -w "wake_jra=%{http_code}\n" --max-time 90 \
            "${BASE}/?source=jra&mode=predict" || true
          sleep 8
          if [ -n "${CRON_TOKEN:-}" ]; then
            Q="?token=${CRON_TOKEN}"
          else
            Q=""
          fi
          for SRC in nar jra; do
            URL="${BASE}/cron/${SRC}-daily${Q}"
            echo "GET ${URL} ..."
            code=$(curl -sS -o "/tmp/${SRC}_cron.json" -w "%{http_code}" --max-time 120 \
              -X GET "$URL" || echo "000")
            echo "${SRC}_cron_http=${code}"
            head -c 400 "/tmp/${SRC}_cron.json" || true
            echo
            if [ "$code" != "200" ] && [ "$code" != "401" ]; then
              sleep 15
              curl -fsS --max-time 120 -X GET "$URL" || true
            fi
            sleep 5
          done
