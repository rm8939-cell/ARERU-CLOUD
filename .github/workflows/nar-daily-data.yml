# 互換: 旧 NAR daily data → racing-daily-data と同等（NAR+JRA）
name: NAR daily data

on:
  schedule:
    - cron: '30 20 * * *'
    - cron: '30 2 * * *'
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh NAR + JRA today and predict
        env:
          TZ: Asia/Tokyo
          ARERU_SKIP_NAR_BOOT: '1'
          ARERU_SKIP_BOOT: '1'
        run: |
          set -euo pipefail
          TODAY=$(date +%F)
          echo "Racing refresh date=${TODAY}"
          python refresh_data.py --dates today --source nar || echo "NAR refresh soft-fail"
          python refresh_data.py --dates today --source jra || echo "JRA refresh soft-fail"
          python replay_predict.py "${TODAY}"
          test -s "data/predictions_by_date/predictions_${TODAY}.csv"
          RANK_CHECK_DATE="${TODAY}" python - <<'PY'
          import os
          from pathlib import Path
          import pandas as pd
          from ev_analysis import assert_predictions_finalized, predictions_are_finalized
          day = os.environ["RANK_CHECK_DATE"]
          p = Path(f"data/predictions_by_date/predictions_{day}.csv")
          df = pd.read_csv(p, encoding="utf-8-sig")
          assert_predictions_finalized(df, label=p.name)
          assert "相対ランク" in df.columns
          pending = df["投資判定"].astype(str).str.contains("判定待", na=False).mean()
          assert pending < 0.2, f"pending={pending:.2%}"
          print("rank finalize ok:", predictions_are_finalized(df))
          PY

      - name: Commit and push data
        env:
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          TODAY=$(date +%F)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/runners.csv \
            "data/predictions_by_date/predictions_${TODAY}.csv" \
            "data/predictions_by_date/scores_${TODAY}.csv" \
            data/odds_tickets || true
          if git diff --staged --quiet; then
            echo "No data changes for ${TODAY}"
            exit 0
          fi
          git commit -m "chore: racing daily data ${TODAY}"
          git push
